
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64 
    container_name: forum-sql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Forum_Password123!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

volumes:
  sql_data:
