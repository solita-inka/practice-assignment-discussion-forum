# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - web-app-forum-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Start SQL Server container
        run: docker compose -f ForumApi.Tests/docker-compose.yaml up -d

      - name: Wait for SQL Server to be ready
        run: |
          for i in $(seq 1 30); do
            if docker exec forum-sql /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'Forum_Password123!' -Q "SELECT 1" &>/dev/null; then
              echo "SQL Server is ready."
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done

      - name: Run tests
        run: dotnet test ForumApi.Tests/ForumApi.Tests.csproj --verbosity normal

      - name: Run function tests
        run: dotnet test ForumApi.Functions.Tests/ForumApi.Functions.Tests.csproj --verbosity normal

      - name: Stop SQL Server container
        if: always()
        run: docker compose -f ForumApi.Tests/docker-compose.yaml down -v

  build:
    runs-on: windows-latest
    needs: test
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build ForumApi/ForumApi.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish ForumApi/ForumApi.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'web-app-forum-api'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}