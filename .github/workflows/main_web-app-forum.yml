name: Build and deploy ForumApi to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build ForumApi
        run: dotnet build practice_assignment/ForumApi/ForumApi.csproj -c Release

      - name: Publish ForumApi
        run: dotnet publish practice_assignment/ForumApi/ForumApi.csproj -c Release -o ${{github.workspace}}/publish

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: forumapi-artifact
          path: ${{github.workspace}}/publish

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: forumapi-artifact
          path: ${{github.workspace}}/publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'web-app-forum'
          slot-name: 'Production'
          package: ${{github.workspace}}/publish
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_29553084BE06452E9847C2A50E9AEF6F }}
